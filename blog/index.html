    <!-- Dark mode toggle -->
    <script>
        // Simple dark mode toggle
        const toggleDarkMode = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
        };

        // Load saved preference
        if (localStorage.getItem('darkMode') === 'true') {
            document.documentElement.classList.add('dark');
        }
    </script>

    <!-- Substack RSS feed -->
    <script>
    (function () {
        var FEED = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent('https://manapate.substack.com/feed');

        var oldPosts = [
            { title: 'Lessons from my 1st Startup - RentPlay.ca', url: 'rentplay-lessons-first-startup.html', date: '2025-09-10T00:00:00', description: 'Reflections on building RentPlay, on co-founders, validation, distribution, B2B vs B2C, and why cashflow beats VC money', category: 'Entrepreneurship' },
            { title: 'SwiftUI Modern Development', url: 'swiftui-modern-development.html', date: '2024-12-15T00:00:00', description: 'Exploring the latest SwiftUI features and modern iOS development practices.', category: 'iOS' },
            { title: 'Swift Concurrency & Multithreading', url: 'swift-concurrency-multithreading.html', date: '2024-12-10T00:00:00', description: 'Understanding async/await and structured concurrency in Swift.', category: 'iOS' },
            { title: 'iOS Unit Testing & Mock Objects', url: 'ios-unit-testing-mock-objects.html', date: '2024-12-05T00:00:00', description: 'Best practices for testing iOS applications with mock objects.', category: 'iOS' },
            { title: 'iOS Networking with Async/Await', url: 'ios-networking-async-await.html', date: '2024-11-28T00:00:00', description: 'Modern networking patterns in iOS using async/await.', category: 'iOS' },
        ];

        function escHtml(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
        function stripHtml(s) { var d = document.createElement('div'); d.innerHTML = s; return d.textContent || d.innerText || ''; }
        function truncate(s, n) { return s.length > n ? s.slice(0, n).trimEnd() + '…' : s; }
        function formatDate(s) { return new Date(s).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
        function safeUrl(s) { return /^https?:\/\//.test(s) ? s : '#'; }

        function categoryBadge(cat) {
            var colors = cat === 'Entrepreneurship'
                ? 'bg-purple-100 dark:bg-purple-900 text-purple-800 dark:text-purple-200'
                : cat === 'iOS'
                ? 'bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200'
                : 'bg-orange-100 dark:bg-orange-900 text-orange-800 dark:text-orange-200';
            return '<span class="px-2 py-1 ' + colors + ' text-xs font-medium rounded">' + escHtml(cat) + '</span>';
        }

        function renderPosts(posts) {
            var container = document.getElementById('blog-posts');
            if (!container) return;
            container.innerHTML = '';
            posts.forEach(function (post) {
                var cat = post.category || 'Substack';
                var url = post.external ? safeUrl(post.url) : post.url;
                var linkAttrs = post.external ? ' target="_blank" rel="noopener noreferrer"' : '';
                var article = document.createElement('article');
                article.className = 'border border-border-light dark:border-border-dark rounded-lg p-6 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors';
                article.innerHTML =
                    '<div class="flex items-center gap-2 mb-3">' +
                        categoryBadge(cat) +
                        '<span class="text-secondary-text-light dark:text-secondary-text-dark secondary-text typewriter">' + formatDate(post.date) + '</span>' +
                    '</div>' +
                    '<h2 class="text-xl font-bold text-text-light dark:text-text-dark mb-2">' +
                        '<a href="' + url + '" class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors"' + linkAttrs + '>' + escHtml(post.title) + '</a>' +
                    '</h2>' +
                    '<p class="text-secondary-text-light dark:text-secondary-text-dark blog-description mb-4">' + escHtml(post.description) + '</p>' +
                    '<div class="flex items-center justify-end">' +
                        '<a href="' + url + '" class="text-sm font-medium text-blue-600 dark:text-blue-400 hover:underline"' + linkAttrs + '>' + (post.external ? 'Read on Substack →' : 'Read more →') + '</a>' +
                    '</div>';
                container.appendChild(article);
            });
        }

        // Show old posts immediately
        renderPosts(oldPosts);

        // Fetch Substack posts and merge
        fetch(FEED)
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (data.status !== 'ok' || !data.items || !data.items.length) return;
                var substackPosts = data.items.map(function (item) {
                    return {
                        title: item.title,
                        url: item.link,
                        date: item.pubDate,
                        description: truncate(stripHtml(item.description || item.content || ''), 180),
                        external: true
                    };
                });
                var merged = substackPosts.concat(oldPosts).sort(function (a, b) {
                    return new Date(b.date) - new Date(a.date);
                });
                renderPosts(merged);
            })
            .catch(function () { /* old posts already shown */ });
    })();
    </script>
